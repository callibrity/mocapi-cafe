server.port=8080
spring.threads.virtual.enabled=true
spring.application.name=mocapi-cafe
logging.level.com.callibrity=INFO

# --- MCP 2026-07-28 response caching (SEP-2549) ---
# These stamp ttlMs / cacheScope onto list + discover results. Individual resource
# handlers can override per-result (see MenuResources vs OrderResources).
mocapi.cache.list-ttl=PT1M
mocapi.cache.scope=public

# --- MRTR elicitation replay token (ADR-0021) ---
# Empty = an ephemeral signing key is generated at startup. Fine for a single-node
# demo; set a stable 32+ byte base64 secret for multi-node deployments.
mocapi.mrtr.secret=

# --- OpenTelemetry (mocapi-otel) ---
# Every tool/prompt/resource call emits a two-layer trace (jsonrpc.server →
# mcp.handler.execution) with MCP/GenAI/JSON-RPC semantic-convention attributes.
# These are Spring Boot 4's native OpenTelemetry keys; spans go OTLP/HTTP to Jaeger's
# all-in-one (see README). Start Jaeger first; if it's down, export just fails quietly.
management.tracing.export.enabled=true
# Sample every request — fine for a demo; dial down (0.01–0.10) in production.
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.tracing.export.otlp.transport=http
# Jaeger ingests OTLP traces but 404s on OTLP metrics; turn metrics export off so the
# log stays clean. (Point at a metrics-capable backend and flip this on to see the
# jsonrpc.server.duration / mcp.handler.execution.duration meters.)
management.otlp.metrics.export.enabled=false

# --- Actuator (mocapi-actuator) ---
# Exposes /actuator/mcp — a read-only snapshot of the registered tools, resources,
# templates, and prompts — alongside health and info.
management.endpoints.web.exposure.include=health,info,mcp
